name: Server Tests

on:
  push:
    branches: [develop]
    paths:
      - "servers/**"
      - "src/dev10x/mcp/**"
      - "src/dev10x/audit/**"
      - "src/dev10x/db/**"
      - "src/dev10x/git/**"
      - "src/dev10x/github/**"
      - "src/dev10x/monitor/**"
      - "src/dev10x/permission/**"
      - "src/dev10x/plan/**"
      - "src/dev10x/release/**"
      - "src/dev10x/skill_index/**"
      - "src/dev10x/utilities/**"
      - "src/dev10x/subprocess_utils.py"
      - "tests/mcp/**"
      - "tests/audit/**"
      - "tests/db/**"
      - "tests/git/**"
      - "tests/github/**"
      - "tests/monitor/**"
      - "tests/permission/**"
      - "tests/plan/**"
      - "tests/release/**"
      - "tests/skill_index/**"
      - "tests/utilities/**"
      - "tests/test_subprocess_utils.py"
      - "pyproject.toml"
      - ".github/workflows/pytest-servers.yml"
  pull_request:
    branches: [develop]
    paths:
      - "servers/**"
      - "src/dev10x/mcp/**"
      - "src/dev10x/audit/**"
      - "src/dev10x/db/**"
      - "src/dev10x/git/**"
      - "src/dev10x/github/**"
      - "src/dev10x/monitor/**"
      - "src/dev10x/permission/**"
      - "src/dev10x/plan/**"
      - "src/dev10x/release/**"
      - "src/dev10x/skill_index/**"
      - "src/dev10x/utilities/**"
      - "src/dev10x/subprocess_utils.py"
      - "tests/mcp/**"
      - "tests/audit/**"
      - "tests/db/**"
      - "tests/git/**"
      - "tests/github/**"
      - "tests/monitor/**"
      - "tests/permission/**"
      - "tests/plan/**"
      - "tests/release/**"
      - "tests/skill_index/**"
      - "tests/utilities/**"
      - "tests/test_subprocess_utils.py"
      - "pyproject.toml"
      - ".github/workflows/pytest-servers.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Run server tests with coverage
        run: |
          uv run --extra dev pytest \
            tests/mcp tests/audit tests/db tests/git tests/github \
            tests/monitor tests/permission tests/plan tests/release \
            tests/skill_index tests/utilities tests/test_subprocess_utils.py \
            -v --tb=short \
            -o 'addopts=' \
            --cov=src/dev10x/mcp \
            --cov=src/dev10x/audit \
            --cov=src/dev10x/db \
            --cov=src/dev10x/git \
            --cov=src/dev10x/github \
            --cov=src/dev10x/monitor \
            --cov=src/dev10x/permission \
            --cov=src/dev10x/plan \
            --cov=src/dev10x/release \
            --cov=src/dev10x/skill_index \
            --cov=src/dev10x/utilities \
            --cov=src/dev10x/subprocess_utils \
            --cov-config=.coveragerc-servers \
            --cov-report=term-missing --cov-fail-under=80
